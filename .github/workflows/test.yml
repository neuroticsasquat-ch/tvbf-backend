name: Test

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U root"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://root:root@localhost:5432/tvbf
      TEST_DATABASE_URL: postgresql+asyncpg://root:root@localhost:5432/tvbf_test
      ADMIN_TOKEN: test-admin-token
      CORS_ALLOWED_ORIGINS: https://app.tvbf.localhost

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install deps
        run: uv pip install --system ".[dev]"

      - name: Create databases + schemas
        env:
          PGPASSWORD: root
        run: |
          psql -h localhost -U root -d postgres -c "CREATE DATABASE tvbf;"
          psql -h localhost -U root -d postgres -c "CREATE DATABASE tvbf_test;"
          for db in tvbf tvbf_test; do
            psql -h localhost -U root -d "$db" -c "CREATE SCHEMA IF NOT EXISTS tvmaze;"
            psql -h localhost -U root -d "$db" -c "CREATE SCHEMA IF NOT EXISTS app;"
          done

      - name: Migrate
        run: alembic upgrade head

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Typecheck
        run: pyright src tests

      - name: Test
        run: pytest
