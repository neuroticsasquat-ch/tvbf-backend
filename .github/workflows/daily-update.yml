name: Daily TV Maze update

# Required configuration (repo Settings → Secrets and variables → Actions):
#   secret  TVBF_ADMIN_TOKEN  — must match the API's ADMIN_TOKEN

on:
  schedule:
    - cron: '0 9 * * *'  # 09:00 UTC daily
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Trigger update
        id: trigger
        run: |
          response=$(curl -fsS -X POST \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            https://api.tvbingefriend.com/admin/update)
          echo "response=$response"
          run_id=$(echo "$response" | jq -r '.run_id')
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
        env:
          ADMIN_TOKEN: ${{ secrets.TVBF_ADMIN_TOKEN }}

      - name: Wait for completion
        env:
          ADMIN_TOKEN: ${{ secrets.TVBF_ADMIN_TOKEN }}
          RUN_ID: ${{ steps.trigger.outputs.run_id }}
        run: |
          for i in $(seq 1 120); do
            body=$(curl -fsS \
              -H "Authorization: Bearer $ADMIN_TOKEN" \
              "https://api.tvbingefriend.com/admin/ingest/$RUN_ID")
            status=$(echo "$body" | jq -r '.status')
            echo "[$i] status=$status"
            case "$status" in
              succeeded)
                echo "$body" | jq .
                exit 0
                ;;
              failed|cancelled)
                echo "$body" | jq .
                exit 1
                ;;
            esac
            sleep 30
          done
          echo "timed out waiting for run $RUN_ID"
          exit 1
