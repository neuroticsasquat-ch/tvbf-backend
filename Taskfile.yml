version: '3'

includes:
  infra:
    taskfile: ../../tbc-localdev-infra/Taskfile.yml
    dir: ../../tbc-localdev-infra

vars:
  COMPOSE: docker compose
  SVC: tvbf-backend
  EXEC: "{{.COMPOSE}} exec {{.SVC}}"

tasks:
  up:
    desc: Start the backend container (requires infra to be up)
    cmds:
      - "{{.COMPOSE}} up -d"

  down:
    desc: Stop the backend container
    cmds:
      - "{{.COMPOSE}} down"

  build:
    desc: Rebuild the backend image
    cmds:
      - "{{.COMPOSE}} build"

  logs:
    desc: Follow backend logs
    cmds:
      - "{{.COMPOSE}} logs -f {{.SVC}}"

  shell:
    desc: Open a bash shell inside the backend container
    cmds:
      - "{{.EXEC}} bash"

  ps:
    desc: Show compose service status
    cmds:
      - "{{.COMPOSE}} ps"

  db:init:
    desc: Create the tvbf and tvbf_test databases and required schemas in the shared Postgres (idempotent)
    cmds:
      - |
        for db in tvbf tvbf_test; do
          docker exec tbc_postgresql_db psql -U root -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='$db'" | grep -q 1 \
            || docker exec tbc_postgresql_db psql -U root -d postgres -c "CREATE DATABASE $db"
          docker exec tbc_postgresql_db psql -U root -d $db -c "CREATE SCHEMA IF NOT EXISTS app; CREATE SCHEMA IF NOT EXISTS tvmaze;"
        done

  migrate:
    desc: Run alembic migrations against the tvbf database
    cmds:
      - "{{.EXEC}} alembic upgrade head"

  makemigration:
    desc: 'Create a new autogenerated migration (task makemigration -- "message")'
    cmds:
      - "{{.EXEC}} alembic revision --autogenerate -m \"{{.CLI_ARGS}}\""

  db:refresh:
    desc: 'Refresh local tvbf with prod tvmaze schema (preserves local app data)'
    cmds:
      - 'scripts/refresh_db.sh tvmaze'

  db:refresh:app:
    desc: 'Refresh local tvbf with prod app schema (anonymizes by default; ANONYMIZE=0 to opt out)'
    cmds:
      - 'scripts/refresh_db.sh app'

  db:refresh:both:
    desc: 'Refresh local tvbf with both prod schemas (anonymizes app by default; ANONYMIZE=0 to opt out)'
    cmds:
      - 'scripts/refresh_db.sh both'

  db:set-password:
    desc: 'Reset a local user password (task db:set-password -- email [password], default: localdev)'
    cmds:
      - 'scripts/set_password.sh {{.CLI_ARGS}}'

  test:
    desc: Run the pytest suite inside the container
    cmds:
      - "{{.EXEC}} pytest {{.CLI_ARGS}}"

  test:unit:
    desc: Run only the unit tests (fast, no DB, no network)
    cmds:
      - "{{.EXEC}} pytest tests/unit {{.CLI_ARGS}}"

  test:integration:
    desc: Run only the integration tests (real test DB)
    cmds:
      - "{{.EXEC}} pytest tests/integration {{.CLI_ARGS}}"

  lint:
    desc: Run ruff check
    cmds:
      - "{{.EXEC}} ruff check src tests"

  format:
    desc: Run ruff format
    cmds:
      - "{{.EXEC}} ruff format src tests"

  typecheck:
    desc: Run pyright static type check
    cmds:
      - "{{.EXEC}} pyright src tests"

  coverage:
    desc: 'Run pytest with coverage (HTML report lands in ./htmlcov)'
    cmds:
      - "{{.EXEC}} pytest --cov=src/tvbf --cov-report=term-missing --cov-report=html {{.CLI_ARGS}}"

  ingest:
    desc: POST /admin/ingest
    cmds:
      - >
        curl -sk -X POST https://api.tvbf.localhost/admin/ingest
        -H "Authorization: Bearer ${ADMIN_TOKEN:-dev-secret-change-me}"

  update:
    desc: POST /admin/update
    cmds:
      - >
        curl -sk -X POST https://api.tvbf.localhost/admin/update
        -H "Authorization: Bearer ${ADMIN_TOKEN:-dev-secret-change-me}"

  ingest:status:
    desc: 'GET /admin/ingest/<id> — task ingest:status -- <uuid>'
    cmds:
      - >
        curl -sk https://api.tvbf.localhost/admin/ingest/{{.CLI_ARGS}}
        -H "Authorization: Bearer ${ADMIN_TOKEN:-dev-secret-change-me}"

  akas:backfill:
    desc: POST /admin/backfill-akas
    cmds:
      - >
        curl -sk -X POST https://api.tvbf.localhost/admin/backfill-akas
        -H "Authorization: Bearer ${ADMIN_TOKEN:-dev-secret-change-me}"

  akas:backfill:status:
    desc: 'GET /admin/backfill-akas/<id> — task akas:backfill:status -- <uuid>'
    cmds:
      - >
        curl -sk https://api.tvbf.localhost/admin/backfill-akas/{{.CLI_ARGS}}
        -H "Authorization: Bearer ${ADMIN_TOKEN:-dev-secret-change-me}"

  ratings:backfill:
    desc: POST /admin/backfill-ratings
    cmds:
      - >
        curl -sk -X POST https://api.tvbf.localhost/admin/backfill-ratings
        -H "Authorization: Bearer ${ADMIN_TOKEN:-dev-secret-change-me}"

  ratings:backfill:status:
    desc: 'GET /admin/backfill-ratings/<id> — task ratings:backfill:status -- <uuid>'
    cmds:
      - >
        curl -sk https://api.tvbf.localhost/admin/backfill-ratings/{{.CLI_ARGS}}
        -H "Authorization: Bearer ${ADMIN_TOKEN:-dev-secret-change-me}"

  deps:add:
    desc: 'Add a dependency and rebuild the image (task deps:add -- <package>)'
    cmds:
      - echo "Edit pyproject.toml to add {{.CLI_ARGS}}, then run task build."

  changelog:
    desc: 'Update CHANGELOG.md (task changelog -- --tag v2026.05). Runs git-cliff on the host.'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - git-cliff {{.CLI_ARGS}} -o CHANGELOG.md

  changelog:preview:
    desc: 'Preview unreleased changelog entries since the last tag (no file write)'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - git-cliff --unreleased
