services:
  tvbf-backend:
    build:
      context: .
      target: prod
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
      TVMAZE_BASE_URL: "https://api.tvmaze.com"
      TVMAZE_RATE_LIMIT_REQUESTS: "18"
      TVMAZE_RATE_LIMIT_WINDOW_SECONDS: "10"
      TVMAZE_RETRY_MAX_ATTEMPTS: "5"
      INGEST_CONSECUTIVE_FAILURE_THRESHOLD: "10"
      INGEST_STALE_RUN_MINUTES: "15"
      LOG_LEVEL: "INFO"
      CORS_ALLOWED_ORIGINS: "https://app.tvbingefriend.com"
      COOKIE_DOMAIN: ".tvbingefriend.com"
      COOKIE_SAMESITE: "lax"
      ENVIRONMENT: "production"
      SENTRY_DSN: "${SENTRY_DSN}"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).status == 200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 3